<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/logo/av-logo.png">

    <!--CSS-->
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./node_modules/maplibre-gl/dist/maplibre-gl.css">
    <link rel="stylesheet" href="./style.css">

    <!--JS and ImportMap-->
    <script type="importmap">
        {
            "imports": {
                "axios": "./node_modules/axios/dist/esm/axios.min.js",
                "bootstrap": "./node_modules/bootstrap/dist/js/bootstrap.esm.min.js",
                "chart.js": "./node_modules/chart.js/dist/chart.js",
                "chart.js/auto": "./node_modules/chart.js/auto/auto.js",
                "maplibre-gl": "./node_modules/maplibre-gl/dist/maplibre-gl.js",
                "@kurkle/color": "./node_modules/@kurkle/color/dist/color.esm.js",
                "@popperjs/core": "./node_modules/@popperjs/core/lib/index.js",
                "#lib/adapters/http.js": "./node_modules/axios/lib/helpers/null.js",
                "#lib/platform/node/classes/FormData.js": "./node_modules/axios/lib/helpers/null.js",
                "#lib/platform/node/index.js": "./node_modules/axios/lib/platform/browser/index.js"
            }
        }
    </script>
    <script type="module" defer src="./js/DOM.js"></script>

    <title>Alpha Vantage</title>
</head>

<body data-bs-theme="dark">
    <nav class="navbar px-3">
        <a class="navbar-brand" href=" #"><b>ALPHA</b> VANTAGE</a>

        <div class="d-flex justify-content-sm-end justify-content-start">
            <div class="position-relative d-flex align-items-center me-2">
                <input id="search" class="form-control form-control-sm bg-secondary border-0" type="search"
                    placeholder="Cerca azienda..." autocomplete="off" autofocus />
                <ul class="dropdown-menu w-100" id="suggestions" role="menu"></ul>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto mb-2 mb-sm-0 d-flex align-items-end">
                <li class="nav-item border-bottom border-2 border-secondary text-start"><a
                        class="nav-link active pe-none">Database JSON-Server</a></li>
                <li class="nav-item border-bottom border-2 text-start"><a class="nav-link">Database AlphaVantage</a>
                </li>
            </ul>
        </div>
    </nav>

    <div id="welcomePage" class="container-fluid flex-column d-flex px-5 py-3 justify-content-center vh-75">
        <h1 class="h1 text-center"><b>ALPHA</b> VANTAGE</h1>
        <div class="marquee mt-2">
            <div>
                <h2 class="h2 text-muted mx-5">Stock Market <i class="bi bi-bank"></i></h2>
                <h2 class="h2 text-muted mx-5">Grafici in tempo reale <i class="bi bi-bar-chart"></i></h2>
                <h2 class="h2 text-muted mx-5">Dati settimanali <i class="bi bi-calendar"></i></h2>
                <h2 class="h2 text-muted mx-5">Informazioni sulle aziende <i class="bi bi-building"></i></h2>

                <h2 class="h2 text-muted mx-5">Stock Market <i class="bi bi-bank"></i></h2>
                <h2 class="h2 text-muted mx-5">Grafici in tempo reale <i class="bi bi-bar-chart"></i></h2>
                <h2 class="h2 text-muted mx-5">Dati settimanali <i class="bi bi-calendar"></i></h2>
                <h2 class="h2 text-muted mx-5">Informazioni sulle aziende <i class="bi bi-building"></i></h2>
            </div>
        </div>
    </div>

    <div id="statContent" class="container-fluid px-5 py-3 d-none">
        <div class="row g-2">
            <div class="col-12">
                <section class="rounded border-2 rounded border p-2 min-vh-75">
                    <canvas id="chartCanvas"></canvas>
                </section>
            </div>
            <div class="col-md-7">
                <section id="companyInfo" class="rounded border-2 rounded border p-5 h-100">
                </section>
            </div>
            <div class="col-md-5">
                <section class="rounded border-2 rounded border h-100 min-vh-10">
                    <div class="row h-100 align-items-center">
                        <div class="col-6 d-flex justify-content-center border-end">
                            <button class="btn btn-success" id="downloadChart">Scarica grafico</button>
                        </div>
                        <div class="col-6 d-flex flex-column justify-content-center gap-2 ps-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="chartOptions" id="lineChart"
                                    value="line" checked>
                                <label class="form-check-label" for="lineChart">Grafico a linee</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="chartOptions" id="barChart"
                                    value="bar">
                                <label class="form-check-label" for="barChart">Grafico a barre</label>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</body>

</html>
